name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  web-and-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: docker compose up -d postgres redis minio
      - run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://crushermitra:crushermitra@localhost:5432/crushermitra
      - run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://crushermitra:crushermitra@localhost:5432/crushermitra
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
